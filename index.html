<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Chúc Mừng 8/3</title>

<style>

body{
margin:0;
height:100vh;
overflow:hidden;
background:linear-gradient(135deg,#f7b2b2,#f6c1d0);
font-family:sans-serif;
}

h1{
text-align:center;
color:white;
font-size:8vw;
margin-top:30px;
text-shadow:0 0 10px rgba(255,255,255,0.7);
}

/* hoa */

.flower{
position:absolute;
top:60%;
left:50%;
transform:translate(-50%,-50%);
width:60vw;
height:60vw;
max-width:320px;
max-height:320px;
}

.petal{
position:absolute;
width:25vw;
height:25vw;
max-width:120px;
max-height:120px;
background:radial-gradient(circle,#ff8fb1,#ff4f87);
border-radius:50%;
opacity:0;
transform:scale(0);
animation:bloom 1s forwards, float 3s ease-in-out infinite;
box-shadow:0 5px 20px rgba(0,0,0,0.2);
}

.center{
position:absolute;
left:35%;
top:35%;
width:18vw;
height:18vw;
max-width:80px;
max-height:80px;
background:radial-gradient(circle,#ffd95c,#ffb300);
border-radius:50%;
box-shadow:0 0 20px rgba(255,200,0,0.8);
animation:float 3s ease-in-out infinite;
}

/* vị trí cánh */

.p1{left:30%;top:0}
.p2{left:60%;top:25%}
.p3{left:45%;top:60%}
.p4{left:10%;top:60%}
.p5{left:0;top:25%}

/* animation */

@keyframes bloom{
to{
opacity:1;
transform:scale(1);
}
}

@keyframes float{
0%,100%{transform:translateY(0)}
50%{transform:translateY(-8px)}
}

/* lời chúc */

.wish{
position:absolute;
color:white;
font-size:4vw;
font-weight:bold;
opacity:0;
white-space:nowrap;
animation:fly 8s linear infinite;
text-shadow:0 0 10px white;
}

@keyframes fly{
0%{
transform:translateY(100vh);
opacity:0;
}
20%{opacity:1}
80%{opacity:1}
100%{
transform:translateY(-100px);
opacity:0;
}
}

/* tim */

.heart{
position:absolute;
color:#ff5c8a;
font-size:6vw;
animation:heartfly 6s linear infinite;
}

@keyframes heartfly{
0%{
transform:translateY(100vh);
opacity:0;
}
20%{opacity:1}
100%{
transform:translateY(-100px);
opacity:0;
}
}

/* sparkle */

.sparkle{
position:absolute;
color:white;
font-size:5vw;
pointer-events:none;
animation:sparkleMove 4s linear infinite;
text-shadow:
0 0 5px white,
0 0 10px white,
0 0 20px #ffd1dc,
0 0 30px #ffd1dc;
}

@keyframes sparkleMove{
0%{
transform:translateY(100vh) scale(0.5);
opacity:0;
}
20%{opacity:1}
100%{
transform:translateY(-100px) scale(1.2);
opacity:0;
}
}

</style>
</head>

<body>

<h1>🌸 Chúc Mừng Ngày 8/3 🌸</h1>

<div class="flower">

<div class="petal p1"></div>
<div class="petal p2"></div>
<div class="petal p3"></div>
<div class="petal p4"></div>
<div class="petal p5"></div>

<div class="center"></div>

</div>

<script>

const wishes=[

"Chúc cô ngày 8/3 thật nhiều niềm vui 💐",
"Chúc cô luôn xinh đẹp và rạng rỡ 🌸",
"Chúc cô luôn mạnh khỏe và hạnh phúc 🍀",
"Mong cô luôn có thật nhiều nụ cười 😊",
"Chúc cô một ngày 8/3 thật ý nghĩa 🌷",
"Chúc cô luôn gặp nhiều điều tốt đẹp ✨",
"Mong cô luôn vui vẻ và bình an 💖",
"Chúc cô luôn tràn đầy năng lượng 🌺",
"Chúc cô thật nhiều sức khỏe 🌼",
"Chúc cô luôn gặp nhiều may mắn 🌹"

];

function createWish(){

let text=document.createElement("div");
text.className="wish";

text.innerText=wishes[Math.floor(Math.random()*wishes.length)];

text.style.left=Math.random()*window.innerWidth+"px";

document.body.appendChild(text);

setTimeout(()=>{text.remove()},9000)

}

setInterval(createWish,2000)

function createHeart(){

let heart=document.createElement("div");
heart.className="heart";
heart.innerHTML="❤";

heart.style.left=Math.random()*window.innerWidth+"px";

document.body.appendChild(heart);

setTimeout(()=>{heart.remove()},8000)

}

setInterval(createHeart,800)

function createSparkle(){

let sparkle=document.createElement("div");
sparkle.className="sparkle";

const icons=["✨","⭐","🌟"];
sparkle.innerHTML=icons[Math.floor(Math.random()*icons.length)];

sparkle.style.left=Math.random()*window.innerWidth+"px";

document.body.appendChild(sparkle);

setTimeout(()=>{sparkle.remove()},6000)

}

setInterval(createSparkle,300)

</script>

</body>
</html>
